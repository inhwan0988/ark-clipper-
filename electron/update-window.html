<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Ark Clipper 업데이트</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        background: #0a1428;
        color: #f5f7fa;
        font-family: -apple-system, "Apple SD Gothic Neo", "맑은 고딕", "Malgun Gothic", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        flex-direction: column;
        padding: 22px 26px;
        gap: 14px;
        user-select: none;
        -webkit-app-region: drag;
      }
      .head {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .badge {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, #4988C4, #1C4D8D);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      h1 {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .version {
        font-size: 11px;
        color: #8893a8;
        margin-top: 2px;
        font-variant-numeric: tabular-nums;
      }
      .new-version {
        color: #36d399;
        font-weight: 700;
      }
      .status {
        font-size: 12.5px;
        color: #cfd6e1;
        line-height: 1.55;
      }
      .bar-wrap {
        position: relative;
        height: 10px;
        border-radius: 999px;
        background: #11203d;
        overflow: hidden;
        border: 1px solid #243a5c;
      }
      .bar {
        position: absolute;
        inset: 0;
        width: 0%;
        background: linear-gradient(90deg, #4988C4, #BDE8F5);
        border-radius: 999px;
        transition: width 220ms ease;
      }
      .bar.indeterminate {
        width: 30%;
        animation: slide 1.2s linear infinite;
      }
      @keyframes slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(380%); }
      }
      .row {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #8893a8;
        font-variant-numeric: tabular-nums;
      }
      .row b {
        color: #f5f7fa;
        font-weight: 700;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }
      button {
        flex: 1;
        -webkit-app-region: no-drag;
        padding: 9px 12px;
        border: 0;
        border-radius: 8px;
        font-size: 12.5px;
        font-weight: 700;
        cursor: pointer;
        background: #1c4d8d;
        color: white;
        transition: background 0.15s;
      }
      button:hover { background: #4988C4; }
      button.secondary {
        background: #11203d;
        color: #8893a8;
      }
      button.secondary:hover { background: #243a5c; color: #fff; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .ok {
        color: #36d399;
        font-weight: 700;
      }
      .err {
        color: #ef5067;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="head">
      <div class="badge">⬆️</div>
      <div>
        <h1 id="title">새 버전 다운로드 중</h1>
        <div class="version">
          v<span id="from">-</span> → <span class="new-version">v<span id="to">-</span></span>
        </div>
      </div>
    </div>

    <div class="status" id="status">업데이트 서버에 연결하고 있어요…</div>

    <div class="bar-wrap">
      <div class="bar indeterminate" id="bar"></div>
    </div>

    <div class="row">
      <span><b id="percent">0%</b></span>
      <span id="speed">-</span>
      <span id="size">-</span>
    </div>

    <div class="actions" id="actions" style="display:none">
      <button class="secondary" id="laterBtn">나중에</button>
      <button id="restartBtn" disabled>다운로드 중…</button>
    </div>
  </body>
</html>
