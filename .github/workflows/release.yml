name: Build & Release

# tag push 시 자동 빌드. 예: git tag v0.2.1 && git push --tags
on:
  push:
    tags:
      - 'v*'
  # 수동 실행도 허용
  workflow_dispatch:

# electron-builder가 GitHub Release에 직접 publish하려면 contents:write 필요
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14    # Apple Silicon
            artifact: 'dist/*.dmg'
            name: mac
          - os: windows-latest
            artifact: 'dist/*.exe'
            name: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # youtube-dl-exec postinstall이 GitHub API(/repos/.../releases/latest)로
      # yt-dlp 메타데이터를 받는데, fetch에 Authorization header를 안 붙여서
      # GITHUB_TOKEN을 줘도 인증이 안 됨 → rate limit 60/h에 막힘.
      # 해결: --ignore-scripts로 postinstall 전체 스킵 → yt-dlp binary는
      # releases/latest/download/ URL로 직접 다운로드 (API 아님, rate limit 없음)
      # → native 모듈(better-sqlite3)만 명시적으로 rebuild.
      - name: Install dependencies (skip postinstall scripts)
        run: npm install --legacy-peer-deps --no-audit --no-fund --ignore-scripts

      - name: Pre-download yt-dlp binary
        shell: bash
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -fSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" \
              -o "node_modules/youtube-dl-exec/bin/yt-dlp.exe"
          else
            curl -fSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" \
              -o "node_modules/youtube-dl-exec/bin/yt-dlp"
            chmod +x "node_modules/youtube-dl-exec/bin/yt-dlp"
          fi
          ls -la node_modules/youtube-dl-exec/bin/

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Build Next.js
        run: npx next build --webpack

      # 한글 burn-in smoke test — 매 빌드마다 자동 검증.
      # 1) Pretendard 폰트 파일 존재  2) ffmpeg drawtext가 fontfile을 정상 open
      # 3) 한글 렌더 결과 mp4가 정상 사이즈로 생성됨 (1KB 이하 = 깨짐).
      # 4) Windows: 한국어 경로 시뮬레이션 (ASCII-safe 경로의 효과 확인).
      - name: Smoke test - Korean font burn-in
        shell: bash
        run: |
          set -e
          if [ "$RUNNER_OS" = "Windows" ]; then
            FFMPEG="node_modules/@ffmpeg-installer/win32-x64/ffmpeg.exe"
          else
            FFMPEG="node_modules/@ffmpeg-installer/darwin-arm64/ffmpeg"
          fi
          # 검증 0: ffmpeg 바이너리 존재
          test -f "$FFMPEG" || { echo "❌ ffmpeg binary not found: $FFMPEG"; exit 1; }
          # 검증 1: Pretendard 폰트 파일 존재
          test -f "public/fonts/Pretendard-Bold.ttf" || { echo "❌ Pretendard-Bold.ttf missing"; exit 1; }
          test -f "public/fonts/Pretendard-Regular.ttf" || { echo "❌ Pretendard-Regular.ttf missing"; exit 1; }
          mkdir -p smoke
          # 검증 2: ASCII 경로에서 한글 drawtext
          "$FFMPEG" -hide_banner -f lavfi -i "color=c=black:s=320x240:d=1" \
            -vf "drawtext=fontfile=public/fonts/Pretendard-Bold.ttf:text='한글테스트':x=10:y=10:fontsize=32:fontcolor=white" \
            -y smoke/ascii.mp4 2> smoke/ascii.log
          test -s smoke/ascii.mp4 || { echo "❌ ASCII path: output empty"; tail -50 smoke/ascii.log; exit 1; }
          SIZE_ASCII=$(wc -c < smoke/ascii.mp4)
          echo "✓ ASCII path output: $SIZE_ASCII bytes"
          test "$SIZE_ASCII" -gt 1024 || { echo "❌ output too small ($SIZE_ASCII bytes)"; tail -50 smoke/ascii.log; exit 1; }
          # 검증 3: ffmpeg stderr에 fontfile/freetype 에러 없는지
          if grep -iE "could not (load|open) font|freetype|cannot find" smoke/ascii.log; then
            echo "❌ font error detected in ffmpeg log"
            cat smoke/ascii.log
            exit 1
          fi
          # 검증 4: better-sqlite3 native module load (Node ABI 기준)
          # Electron ABI와 다를 수 있어 fail해도 빌드는 계속 (electron-builder가 다시 처리).
          node -e "try { const Database = require('better-sqlite3'); const db = new Database(':memory:'); db.close(); console.log('✓ better-sqlite3 Node ABI load OK'); } catch (e) { console.warn('⚠️ better-sqlite3 Node ABI load failed (Electron ABI는 별도):', e.message); }"
          echo "✅ Smoke test passed: ffmpeg drawtext + Pretendard 한글 정상 렌더"

      # E2E test — Electron 앱 source launch + 메인 윈도우 로드 자동 검증.
      # next dev 서버를 백그라운드로 띄우고 electron source로 launch (production .exe 아님).
      # 실제 production 한글 폰트 fix는 위 smoke test에서 검증. 이건 UI launch 자체.
      - name: Install Playwright (no browsers — Electron만 사용)
        run: npx playwright install-deps || true

      - name: Start Next dev server (background)
        shell: bash
        run: |
          npx next dev --port 3000 > next-dev.log 2>&1 &
          echo "NEXT_PID=$!" >> $GITHUB_ENV
          npx wait-on http://localhost:3000 --timeout 120000

      - name: Run E2E tests (Electron launch)
        shell: bash
        run: npx playwright test
        continue-on-error: true  # E2E가 불안정해도 빌드는 계속 (점진적 도입)

      - name: Stop Next dev server
        if: always()
        shell: bash
        run: |
          if [ -n "$NEXT_PID" ]; then
            kill "$NEXT_PID" 2>/dev/null || true
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.name }}
          path: |
            playwright-report/
            next-dev.log
          retention-days: 7

      # electron-builder --publish always → GitHub Release에 직접 업로드.
      # latest.yml / latest-mac.yml / blockmap 파일 자동 생성 + 포함.
      # 이게 있어야 사용자 PC의 electron-updater가 새 버전 자동 다운로드 가능.
      - name: Build Electron (Mac)
        if: matrix.name == 'mac'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

      - name: Build Electron (Windows)
        if: matrix.name == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      # 빌드 산출물 백업 (release 실패해도 다운로드 가능)
      - name: Upload artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
